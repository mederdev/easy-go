# Static serving for the client SPA/PWA (built into this image).
# The edge nginx terminates TLS and proxies easygo-transfer.com here.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets — safe to cache for a long time.
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA history fallback — every unknown path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the HTML entry point.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
