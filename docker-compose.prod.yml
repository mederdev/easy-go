# EasyGo production stack — single VPS, everything in containers incl. nginx.
#
# Images are built & pushed to GHCR by CI; the server only pulls + runs them.
# ALWAYS invoke with the prod env file so ${interpolation} resolves:
#
#   docker compose --env-file .env.prod -f docker-compose.prod.yml <cmd>
#
# First-time bring-up (TLS): see scripts/init-letsencrypt.sh and DEPLOYMENT.md.
name: easygo-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB come from .env.prod
    # (injected straight into the container — single source of truth).
    env_file: [.env.prod]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER:-easygo}"']
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [easygo]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [easygo]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    # MINIO_ROOT_USER / MINIO_ROOT_PASSWORD / MINIO_API_CORS_ALLOW_ORIGIN /
    # MINIO_REGION come from .env.prod (injected into the container).
    env_file: [.env.prod]
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [easygo]

  # one-shot: create the app bucket on first boot
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file: [.env.prod]
    # $$VAR is escaped so the container shell (not compose) expands it — values
    # come from the injected .env.prod, matching the minio service exactly.
    entrypoint:
      - /bin/sh
      - -c
      - >-
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD";
        mc mb --ignore-existing "local/$${MINIO_BUCKET:-easygo}";
        mc anonymous set download "local/$${MINIO_BUCKET:-easygo}/public";
        exit 0
    networks: [easygo]

  # one-shot (profile: tools): apply pending Prisma migrations. Run explicitly
  # before `up -d` in deploys. Idempotent — applies only pending migrations.
  migrate:
    image: ghcr.io/${GHCR_OWNER:?set GHCR_OWNER in .env.prod}/easygo-api:${TAG:-latest}
    profiles: ['tools']
    restart: 'no'
    env_file: [.env.prod]
    command: ['pnpm', 'run', 'db:deploy']
    depends_on:
      postgres:
        condition: service_healthy
    networks: [easygo]

  api:
    image: ghcr.io/${GHCR_OWNER:?set GHCR_OWNER in .env.prod}/easygo-api:${TAG:-latest}
    restart: unless-stopped
    env_file: [.env.prod]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [easygo]

  admin:
    image: ghcr.io/${GHCR_OWNER:?set GHCR_OWNER in .env.prod}/easygo-admin:${TAG:-latest}
    restart: unless-stopped
    networks: [easygo]

  client:
    image: ghcr.io/${GHCR_OWNER:?set GHCR_OWNER in .env.prod}/easygo-client:${TAG:-latest}
    restart: unless-stopped
    networks: [easygo]

  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [api, admin, client]
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
    # Reload every 6h so renewed certs are picked up without a restart.
    command: ['sh', '-c', "while :; do sleep 6h; nginx -s reload; done & nginx -g 'daemon off;'"]
    networks: [easygo]

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    # Attempt renewal twice a day; certbot only renews within 30d of expiry.
    entrypoint: ['/bin/sh', '-c', 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done']
    networks: [easygo]

volumes:
  pgdata:
  redisdata:
  miniodata:
  certbot-etc:
  certbot-var:
  certbot-webroot:

networks:
  easygo:
    driver: bridge
