# EasyGo local stack.
#   pnpm infra:up    → backing services only (postgres, redis, minio)
#   docker compose --profile full up --build → full stack incl. api + nginx
name: easygo

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-easygo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-easygo}
      POSTGRES_DB: ${POSTGRES_DB:-easygo}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-easygo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-easygo}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-easygo-secret}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # one-shot: create the app bucket on first boot
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-easygo} ${MINIO_ROOT_PASSWORD:-easygo-secret};
      mc mb --ignore-existing local/${MINIO_BUCKET:-easygo};
      mc anonymous set download local/${MINIO_BUCKET:-easygo}/public;
      exit 0;
      "

  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-easygo}:${POSTGRES_PASSWORD:-easygo}@postgres:5432/${POSTGRES_DB:-easygo}?schema=public
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-easygo}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-easygo-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-easygo}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      NODE_ENV: production
      API_PORT: "3000"
    ports:
      - "3000:3000"

  nginx:
    profiles: ["full"]
    image: nginx:1.27-alpine
    depends_on:
      - api
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"

volumes:
  pgdata:
  redisdata:
  miniodata:
