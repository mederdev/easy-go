# EasyGo edge reverse proxy — TLS termination + per-subdomain routing.
#   easygo-transfer.com (+ www)   → client SPA
#   admin.easygo-transfer.com     → admin SPA
#   api.easygo-transfer.com       → Fastify API
#   storage.easygo-transfer.com   → MinIO (presigned uploads/downloads)
#
# A single Let's Encrypt certificate (primary name easygo-transfer.com) carries
# all hostnames as SANs, so every server block references the same lineage.

# --- shared TLS settings (http context) ---
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;

upstream easygo_api    { server api:3000; }
upstream easygo_admin  { server admin:80; }
upstream easygo_client { server client:80; }
upstream easygo_minio  { server minio:9000; }

# ---- HTTP :80 — ACME challenge + redirect everything else to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name easygo-transfer.com www.easygo-transfer.com
                admin.easygo-transfer.com api.easygo-transfer.com
                storage.easygo-transfer.com;

    # Certbot webroot challenge (shared volume with the certbot container).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- API (api.easygo-transfer.com) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.easygo-transfer.com;

    ssl_certificate     /etc/letsencrypt/live/easygo-transfer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/easygo-transfer.com/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://easygo_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- Admin SPA (admin.easygo-transfer.com) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.easygo-transfer.com;

    ssl_certificate     /etc/letsencrypt/live/easygo-transfer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/easygo-transfer.com/privkey.pem;

    location / {
        proxy_pass http://easygo_admin;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- Client SPA (apex + www) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name easygo-transfer.com www.easygo-transfer.com;

    ssl_certificate     /etc/letsencrypt/live/easygo-transfer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/easygo-transfer.com/privkey.pem;

    location / {
        proxy_pass http://easygo_client;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- MinIO object storage (storage.easygo-transfer.com) ----
# Browsers hit presigned PUT/GET URLs directly. Host MUST be preserved so the
# MinIO SigV4 host check matches the host the API signed for.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name storage.easygo-transfer.com;

    ssl_certificate     /etc/letsencrypt/live/easygo-transfer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/easygo-transfer.com/privkey.pem;

    client_max_body_size 50m;

    location / {
        proxy_pass http://easygo_minio;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;      # stream large uploads
        proxy_connect_timeout 300;
        proxy_send_timeout    300;
        proxy_read_timeout    300;
    }
}
