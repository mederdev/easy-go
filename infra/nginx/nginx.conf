# Reverse proxy: /api/* → Fastify, everything else → static admin/PWA build.
# Static roots are mounted/copied at deploy time; for local dev the SPAs run
# on their own Vite servers and this file only fronts the API.

upstream easygo_api {
    server api:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # API
    location /api/ {
        proxy_pass http://easygo_api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # health passthrough
    location = /health {
        proxy_pass http://easygo_api/health;
    }

    # Admin SPA (built assets copied to /usr/share/nginx/html/admin)
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Client PWA (built assets copied to /usr/share/nginx/html)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
